name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GJS and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gjs gettext libglib2.0-bin

      - name: Compile GSettings schema
        run: glib-compile-schemas schemas/

      - name: Validate metadata.json
        run: python3 -m json.tool metadata.json > /dev/null

      - name: Run tests
        run: bash tests/run.sh

      - name: Syntax-check extension.js
        run: node --check extension.js

      - name: Syntax-check prefs.js
        run: node --check prefs.js

  package:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gnome-shell-extensions zip libglib2.0-bin
      - name: Package
        run: gnome-extensions pack --force --extra-source=lib --extra-source=README.md --extra-source=LICENSE .
      - uses: actions/upload-artifact@v4
        with:
          name: clipboard.shell-extension
          path: just-clipboard@0emirhan.shell-extension.zip
